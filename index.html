let data = JSON.parse(localStorage.getItem("bzData_v4") || JSON.stringify(window.BZ_DATA));
const OFFICIAL_CALENDAR_TOURS = ["Koshi Inaba LIVE 2026-2027 ～enV～", "TMG LIVE 2026 “SAYONARA”"];
const UNUSED_CALENDAR_IMPORT_ARTISTS = ["B'z"];
function syncOfficialCalendarEvents(){
 const official = window.BZ_DATA.calendarEvents || [];
 const officialIds = new Set(official.map(event=>event.id));
 const officialTours = new Set(OFFICIAL_CALENDAR_TOURS);
 const unusedImportArtists = new Set(UNUSED_CALENDAR_IMPORT_ARTISTS);
 const customEvents = (Array.isArray(data.calendarEvents) ? data.calendarEvents : [])
  .filter(event=>!officialIds.has(event.id) && !officialTours.has(event.tour) && !unusedImportArtists.has(event.artist));
 data.calendarEvents = customEvents.concat(official);
}
let selectedTour = localStorage.getItem("selectedTour_v4") || "FYOP+";
let selectedCalendarType = "ALL";
let selectedCalendarArtist = "ALL";
let selectedCalendarShowPast = false;
syncOfficialCalendarEvents();
const app = document.querySelector("#app");
const navBtns = document.querySelectorAll("nav button");
const stickyHeader = document.querySelector("header");
function updateHeaderStickyOffset(){
 if(!stickyHeader) return;
 document.documentElement.style.setProperty("--headerStickyOffset", `${Math.ceil(stickyHeader.getBoundingClientRect().height)}px`);
}
updateHeaderStickyOffset();
window.addEventListener("resize", updateHeaderStickyOffset);
if(window.ResizeObserver && stickyHeader) new ResizeObserver(updateHeaderStickyOffset).observe(stickyHeader);
navBtns.forEach(b=>b.onclick=()=>{navBtns.forEach(x=>x.classList.remove("active"));b.classList.add("active");render(b.dataset.tab)});

function saveLocal(){ localStorage.setItem("bzData_v4", JSON.stringify(data)); }
function tours(){return data.tours || []}
function visibleShows(){return data.shows.filter(s=>selectedTour==="ALL" || s.tour===selectedTour).sort((a,b)=>a.id.localeCompare(b.id))}
function visibleIds(){return new Set(visibleShows().map(s=>s.id))}
function showDateKey(show){
 const match=String(show.id||"").match(/\d{4}-\d{2}-\d{2}/);
 if(match)return match[0];
 const date=String(show.date||"").replace(/\//g,"-");
 return /^\d{4}-\d{1,2}-\d{1,2}$/.test(date)
  ? date.split("-").map((part,i)=>i===0?part:part.padStart(2,"0")).join("-")
  : "";
}
function latestShowDate(shows){
 return shows
  .filter(s=>s.status==="入力済")
  .map(showDateKey)
  .filter(Boolean)
  .sort((a,b)=>b.localeCompare(a))[0] || "";
}
function rows(){const ids=visibleIds(); return data.setlists.filter(r=>ids.has(r.showId)&&r.song&&r.song.trim()).map(r=>({...r,song:normalizeSongName(r.song)})).sort((a,b)=>a.showId.localeCompare(b.showId)||a.order-b.order)}
function showMap(){return Object.fromEntries(data.shows.map(s=>[s.id,s]))}
function setApp(html, options={}){
 const showTourBar = options.showTourBar !== false;
 app.innerHTML = (showTourBar ? tourBar() : "") + html;
 if(showTourBar) bindTourBar();
}
function tourBar(){
 const items=[{id:"ALL",label:"全部",year:""}].concat(tours());
 return `<div class="tourbar">${items.map(t=>`<button class="tourBtn ${selectedTour===t.id?'active':''}" data-tour="${t.id}">${t.label}${t.year?`<small>${t.year}</small>`:""}</button>`).join("")}</div>`;
}
function bindTourBar(){
 document.querySelectorAll(".tourBtn").forEach(btn=>btn.onclick=()=>{selectedTour=btn.dataset.tour; localStorage.setItem("selectedTour_v4", selectedTour); const active=document.querySelector("nav button.active"); render(active?active.dataset.tab:"dash");});
}

const CALENDAR_TYPE_LABELS = {
 ALL: "すべて",
 live: "公演",
 entry_start: "受付開始",
 entry_deadline: "受付締切",
 lottery_result: "当落発表",
 general_sale: "一般発売",
 door_sale: "直前販売",
 notice: "注意事項"
};
const CALENDAR_TYPE_ORDER = ["ALL","live","entry_start","entry_deadline","lottery_result","general_sale","door_sale","notice"];
const CALENDAR_ARTIST_ORDER = ["ALL","B'z","Koshi Inaba","TMG"];

function calendarEvents(){
 return (data.calendarEvents || [])
  .map(normalizeCalendarEvent)
  .sort((a,b)=>calendarSortKey(a).localeCompare(calendarSortKey(b)) || a.title.localeCompare(b.title,'ja'));
}
function normalizeCalendarEvent(event){
 return {
  id: event.id || `${event.date}-${event.type}-${event.title}`,
  date: event.date || "",
  endDate: event.endDate || "",
  time: event.time || "",
  type: event.type || "notice",
  artist: event.artist || "B'z",
  tour: event.tour || "",
  title: event.title || "Untitled",
  area: event.area || "",
  venue: event.venue || "",
  description: event.description || "",
  url: event.url || "",
  status: event.status || "scheduled"
 };
}
function calendarSortKey(event){return `${event.date || "9999-99-99"}T${event.time || "99:99"}`;}
function todayKey(){return new Date().toISOString().slice(0,10);}
function isCalendarPast(event){
 if(event.status === "ended") return true;
 const endKey = event.endDate || event.date;
 return Boolean(endKey) && endKey < todayKey();
}
function calendarDateLabel(event){
 const date = event.date ? event.date.replaceAll("-","/") : "日付未定";
 const end = event.endDate ? ` 〜 ${event.endDate.replaceAll("-","/")}` : "";
 return date + end;
}
function calendarMeta(event){
 return [event.tour, event.area, event.venue].filter(Boolean).join(" / ");
}
function filteredCalendarEvents(){
 return calendarEvents().filter(event=>
  (selectedCalendarShowPast || !isCalendarPast(event)) &&
  (selectedCalendarType === "ALL" || event.type === selectedCalendarType) &&
  (selectedCalendarArtist === "ALL" || event.artist === selectedCalendarArtist)
 );
}
function calendarFilterSummaryItems(){
 const typeLabel = CALENDAR_TYPE_LABELS[selectedCalendarType] || selectedCalendarType;
 const artistLabel = selectedCalendarArtist === "ALL" ? "全アーティスト" : selectedCalendarArtist;
 const pastLabel = selectedCalendarShowPast ? "終了済み表示" : "終了済み非表示";
 return [typeLabel, artistLabel, pastLabel];
}
function renderCalendarStateBar(){
 return `<div class="calendarStateBar" aria-label="現在の絞り込み条件"><b>表示中：</b>${calendarFilterSummaryItems().map(escapeHtml).join(" / ")}</div>`;
}
function escapeHtml(value){
 return String(value ?? "").replace(/[&<>'"]/g, ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[ch]));
}

function calendarDateTimeParts(date, time="00:00"){
 const [year, month, day] = String(date || "").split("-").map(Number);
 const [hour, minute] = String(time || "00:00").split(":").map(Number);
 if(!year || !month || !day) return null;
 return {year, month, day, hour: hour || 0, minute: minute || 0};
}
function calendarDateFromParts(parts){
 if(!parts) return null;
 return new Date(parts.year, parts.month - 1, parts.day, parts.hour, parts.minute, 0);
}
function calendarIcsDateTime(date){
 const pad = value => String(value).padStart(2,"0");
 return `${date.getFullYear()}${pad(date.getMonth()+1)}${pad(date.getDate())}T${pad(date.getHours())}${pad(date.getMinutes())}${pad(date.getSeconds())}`;
}
function calendarAddMinutes(date, minutes){
 return new Date(date.getTime() + minutes * 60000);
}
function calendarParsePeriod(description){
 const text = String(description || "");
 const match = text.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})\s+(\d{1,2}):(\d{2})\s*[～〜~\-]+\s*(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})\s+(\d{1,2}):(\d{2})/);
 if(!match) return null;
 const nums = match.slice(1).map(Number);
 return {
  start: new Date(nums[0], nums[1]-1, nums[2], nums[3], nums[4], 0),
  end: new Date(nums[5], nums[6]-1, nums[7], nums[8], nums[9], 0)
 };
}
function calendarIcsTiming(event){
 const period = event.type === "entry_start" ? calendarParsePeriod(event.description) : null;
 if(period && period.end > period.start) return period;
 const start = calendarDateFromParts(calendarDateTimeParts(event.date, event.time || "00:00"));
 if(!start) return null;
 const fallbackMinutes = event.type === "live" ? 120 : 1;
 return {start, end: calendarAddMinutes(start, fallbackMinutes)};
}
function escapeIcsText(value){
 return String(value ?? "")
  .replace(/\\/g,"\\\\")
  .replace(/\r\n|\r|\n/g,"\\n")
  .replace(/;/g,"\\;")
  .replace(/,/g,"\\,");
}
function foldIcsLine(line){
 const chunks = [];
 let current = "";
 for(const char of line){
  if(new TextEncoder().encode(current + char).length > 74){
   chunks.push(current);
   current = char;
  }else{
   current += char;
  }
 }
 chunks.push(current);
 return chunks.map((chunk, index)=>index ? ` ${chunk}` : chunk).join("\r\n");
}
function calendarIcsDescription(event){
 const rows = [
  event.description,
  `種別：${CALENDAR_TYPE_LABELS[event.type] || event.type}`,
  `アーティスト：${event.artist}`,

  event.area ? `エリア：${event.area}` : "",
  event.url ? `URL：${event.url}` : ""
 ].filter(Boolean);
 return rows.join("\n");
}
function calendarIcsSummary(event){
 return [event.artist, event.tour, event.title].filter(Boolean).join(" / ");
}
function calendarIcsLocation(event){
 return [event.area, event.venue].filter(Boolean).join(" ");
}
function calendarIcsFilename(){
 const parts = ["bz", "calendar"];
 if(selectedCalendarArtist !== "ALL") parts.push(selectedCalendarArtist);
 if(selectedCalendarType !== "ALL") parts.push(CALENDAR_TYPE_LABELS[selectedCalendarType] || selectedCalendarType);
 if(parts.length === 2) parts.push("all");
 return `${parts.join("-").toLowerCase().replace(/b'z/g,"bz").replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"")}.ics`;
}
function calendarIcsEvent(event, dtstamp){
 const timing = calendarIcsTiming(event);
 if(!timing) return "";
 const lines = [
  "BEGIN:VEVENT",
  `UID:${escapeIcsText(event.id)}@bz-setlist`,
  `DTSTAMP:${dtstamp}`,
  `DTSTART;TZID=Asia/Tokyo:${calendarIcsDateTime(timing.start)}`,
  `DTEND;TZID=Asia/Tokyo:${calendarIcsDateTime(timing.end)}`,
  `SUMMARY:${escapeIcsText(calendarIcsSummary(event))}`,
  `DESCRIPTION:${escapeIcsText(calendarIcsDescription(event))}`,
  `LOCATION:${escapeIcsText(calendarIcsLocation(event))}`,
  "END:VEVENT"
 ];
 return lines.map(foldIcsLine).join("\r\n");
}
function buildCalendarIcs(events){
 const dtstamp = new Date().toISOString().replace(/[-:]/g,"").replace(/\.\d{3}Z$/, "Z");
 const lines = [
  "BEGIN:VCALENDAR",
  "VERSION:2.0",
  "PRODID:-//bz-setlist//calendar export//JA",
  "CALSCALE:GREGORIAN",
  "X-WR-TIMEZONE:Asia/Tokyo",
  ...events.map(event=>calendarIcsEvent(event, dtstamp)).filter(Boolean),
  "END:VCALENDAR"
 ];
 return `${lines.join("\r\n")}\r\n`;
}

function normalizeSongName(song){
  let normalized = String(song || "").trim();
  normalized = normalized
    .replace(/The\s*(Ⅲ|III|IIIRD)\s*R?D?\s*Eye/gi, "The IIIRD Eye")
    .replace(/^shower$/i, "Shower")
    .replace(/#1090\s*[～〜~]?\s*Million Dreams\s*[～〜~]?\s*(?:\/\s*(?:Tak Matsumoto|松本孝弘))?/i, "#1090~Million Dreams~ / 松本孝弘")
    .replace(/EPIC MATCH\s*\/\s*Tak Matsumoto/i, "EPIC MATCH / Tak Matsumoto")
    .replace(/ミエナイチカラ\s*[～〜~]\s*INVISIBLE ONE\s*[～〜~]?/gi, "ミエナイチカラ 〜INVISIBLE ONE〜");
  return normalized;
}
function songCounts(){

function changesFromPrev(showId){

function parseSongs(text, showId){
 const lines=text.split(/\n/).map(x=>x.trim()).filter(Boolean), out=[];
 let fallbackOrder=1;
 const toHalfWidthNum=s=>s.replace(/[０-９]/g,ch=>String.fromCharCode(ch.charCodeAt(0)-0xFEE0));
 for(const line of lines){
   if(/^(SHOWCASE|FYOP|FYOD|B'z|アンコール|Encore|ENCORE)/i.test(line)) continue;
   const normalizedLine=toHalfWidthNum(line);
   const m=normalizedLine.match(/^(\d+)(?:[\.．\)）\s、-]+)(.+)$/);
   if(m){
     const order=Number(m[1]), song=normalizeSongName(m[2].trim());
     if(song) out.push({showId,order,song,section:order>=19?"Encore":"Main"});
     fallbackOrder=Math.max(fallbackOrder,order+1);
     continue;
   }
   const song=normalizeSongName(line);
   if(!song) continue;
   const order=fallbackOrder++;
   out.push({showId,order,song,section:order>=19?"Encore":"Main"});
 }
 return out;
}

 document.querySelector("#saveReplaceBtn").onclick=()=>{const parsed=readParsed(); if(!parsed)return; const id=sel.value; data.setlists=data.setlists.filter(r=>r.showId!==id).concat(parsed); data.shows=data.shows.map(s=>s.id===id?{...s,status:"入力済"}:s); data.updated=new Date().toISOString().slice(0,10); saveLocal(); alert("全上書きしました"); render("shows");};
 document.querySelector("#addShowBtn").onclick=()=>{const t=document.querySelector("#newTour").value, date=document.querySelector("#newDate").value.trim(), label=document.querySelector("#newLabel").value.trim()||date, area=document.querySelector("#newArea").value.trim(), venue=document.querySelector("#newVenue").value.trim(), type=document.querySelector("#newType").value; if(!date||!area||!venue){alert("日付・エリア・会場を入れてください");return;} const id=(date.replaceAll("/","-")+"-"+area+"-"+Math.random().toString(36).slice(2,6)).replace(/\s/g,""); data.shows.push({id,date,label,area,venue,status:"未入力",tour:t,series:t==="SHOWCASE"?"SHOWCASE":(t==="FYOD"?"FC":"LIVE-GYM"),type}); selectedTour=t; localStorage.setItem("selectedTour_v4",selectedTour); saveLocal(); alert("公演を追加しました。次にセトリを貼って保存できます。"); render("import");};
}
render();
</script>
